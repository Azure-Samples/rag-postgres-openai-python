[tool.ruff]
line-length = 120
target-version = "py39"
lint.select = ["E", "F", "I", "UP"]
lint.ignore = ["D203"]
lint.isort.known-first-party = ["fastapi_app"]

[tool.ty.environment]
root = ["./src/backend", "."]

[tool.ty.analysis]
allowed-unresolved-imports = [
    "azure.ai.evaluation.**",
    "rich.**",
    "pgvector.**",
    "evaltools.**",
]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
pythonpath = ['src/backend']
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.report]
show_missing = true
